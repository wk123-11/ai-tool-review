---
layout: default
---
<article class="post">
  <h1>{{ page.title }}</h1>
  <p class="post-meta">{{ page.date | date: '%Y-%m-%d' }} | {{ page.categories | join: ', ' }}</p>
  <div class="post-content">
    {{ content }}
  </div>
  <nav class="post-nav">
    {% if page.previous %}<a href="{{ site.baseurl }}{{ page.previous.url }}" class="prev">← {{ page.previous.title }}</a>{% endif %}
    {% if page.next %}<a href="{{ site.baseurl }}{{ page.next.url }}" class="next">{{ page.next.title }} →</a>{% endif %}
  </nav>
</article>
